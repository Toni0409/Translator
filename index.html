<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DOCX Translator Pro</title>
<style>
:root{
  --bg:#0f1117;--surf:#1a1d27;--surf2:#22263a;--border:#2e3250;
  --accent:#6c63ff;--text:#e8eaf6;--dim:#9098b8;
  --green:#51cf66;--red:#ff6b6b;--warn:#ffd43b;--orange:#e67c00;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);
  font-family:'Segoe UI',system-ui,sans-serif;
  min-height:100vh;display:flex;flex-direction:column}

header{background:var(--surf);border-bottom:1px solid var(--border);
  padding:11px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;z-index:10}
.logo{font-size:1.1rem;font-weight:700;color:var(--accent)}
.hctls{display:flex;align-items:center;gap:8px;margin-left:auto}
select{background:var(--surf2);border:1px solid var(--border);color:var(--text);
  padding:6px 11px;border-radius:7px;font-size:.85rem;cursor:pointer;outline:none}
button{padding:7px 17px;border-radius:7px;border:none;font-size:.85rem;
  font-weight:600;cursor:pointer;transition:all .15s}
.btn-p{background:var(--accent);color:#fff}.btn-p:hover{filter:brightness(1.15)}
.btn-g{background:var(--green);color:#111}.btn-g:hover{filter:brightness(1.1)}
.btn-o{background:transparent;border:1px solid var(--border);color:var(--dim)}
.btn-o:hover{border-color:var(--accent);color:var(--accent)}
button:disabled{opacity:.38;cursor:not-allowed}

/* Upload */
#upload-zone{flex:1;display:flex;align-items:center;justify-content:center;padding:40px}
.drop{border:2px dashed var(--border);border-radius:20px;padding:56px 80px;
  text-align:center;cursor:pointer;transition:.3s;max-width:500px;width:100%}
.drop:hover,.drop.over{border-color:var(--accent);background:rgba(108,99,255,.07)}
.drop .icon{font-size:3.8rem;margin-bottom:14px}
.drop h2{font-size:1.25rem;margin-bottom:8px}
.drop p{color:var(--dim);font-size:.87rem;line-height:1.55}
#file-in{display:none}

/* Workspace */
#workspace{flex:1;display:none;flex-direction:column;overflow:hidden;min-height:0}

/* Info bar */
.info-bar{background:var(--surf);border-bottom:1px solid var(--border);
  padding:9px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.info-bar .fname{font-weight:600;font-size:.9rem}
.chip{background:var(--surf2);border:1px solid var(--border);border-radius:4px;
  padding:2px 8px;font-size:.72rem;color:var(--dim)}
.chip.trans{border-color:var(--accent);color:var(--accent)}
.chip.skip{border-color:var(--orange);color:var(--orange)}

/* Progress bar */
#prog-wrap{display:none;background:var(--surf);border-bottom:1px solid var(--border);
  padding:10px 18px;flex-shrink:0}
.prog-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.prog-label{font-size:.8rem;color:var(--dim)}
.prog-pct{font-size:.8rem;font-weight:700;color:var(--accent)}
.prog-bar-bg{background:var(--surf2);border-radius:999px;height:7px;width:100%;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:999px;background:var(--accent);
  width:0%;transition:width .35s ease;box-shadow:0 0 8px rgba(108,99,255,.5)}

/* Table area */
.tbl-wrap{flex:1;overflow:auto}
table{width:100%;border-collapse:collapse;font-size:.83rem}
thead th{background:var(--surf);position:sticky;top:0;z-index:2;
  padding:9px 14px;text-align:left;font-size:.75rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.7px;color:var(--dim);
  border-bottom:2px solid var(--border)}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.025)}
td{padding:9px 14px;vertical-align:top;line-height:1.5}
td.id-col{width:80px;font-family:monospace;font-size:.7rem;color:var(--dim)}
td.role-col{width:110px}
td.en-col{width:40%;color:var(--dim)}
td.vi-col{color:var(--text)}

/* Inline editable cell */
td.vi-col[contenteditable="true"]{
  outline:none;
  cursor:text;
  border-radius:4px;
  transition:background .15s, box-shadow .15s;
}
td.vi-col[contenteditable="true"]:hover{
  background:rgba(108,99,255,.06);
}
td.vi-col[contenteditable="true"]:focus{
  background:rgba(108,99,255,.12);
  box-shadow:inset 0 0 0 1px var(--accent);
}
td.vi-col.saving{opacity:.55}
td.vi-col.saved-ok::after{
  content:'✓';
  color:var(--green);
  font-size:.7rem;
  margin-left:5px;
  animation:fade-out 1.5s forwards;
}
@keyframes fade-out{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

/* Role badges */
.role{display:inline-block;padding:2px 7px;border-radius:4px;
  font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.role-title{background:rgba(108,99,255,.2);color:#a8a3ff}
.role-section_heading{background:rgba(72,219,207,.15);color:#48dbcf}
.role-paragraph{background:rgba(255,255,255,.06);color:var(--dim)}
.role-bullet{background:rgba(255,196,0,.15);color:#ffc400}
.role-table_cell{background:rgba(230,124,0,.15);color:var(--orange)}
.role-note{background:rgba(255,107,107,.15);color:var(--red)}
.role-toc{background:rgba(100,210,255,.15);color:#64d2ff}

/* Streaming shimmer row */
@keyframes shimmer{0%{opacity:.3}50%{opacity:.7}100%{opacity:.3}}
tr.loading td{animation:shimmer 1.2s infinite}

/* Status */
#status{background:var(--surf);border-top:1px solid var(--border);
  padding:6px 16px;font-size:.75rem;color:var(--dim);
  display:flex;align-items:center;gap:8px;flex-shrink:0}
.spin{width:13px;height:13px;border:2px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.dot{width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0}
.dot.e{background:var(--red)}.dot.w{background:var(--warn)}

/* Toast */
#toast{position:fixed;bottom:20px;left:50%;
  transform:translateX(-50%) translateY(10px);
  background:var(--green);color:#111;padding:9px 22px;
  border-radius:8px;font-weight:600;font-size:.87rem;
  z-index:9999;opacity:0;transition:.28s;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
#toast.e{background:var(--red);color:#fff}
#toast.w{background:var(--warn);color:#111}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<header>
  <div class="logo">📝 DOCX Translator Pro</div>
  <div class="hctls" id="hctls" style="display:none">
    <select id="lsel">
      <option value="Vietnamese">🇻🇳 Tiếng Việt</option>
      <option value="English">🇬🇧 English</option>
    </select>
    <button class="btn-p" id="btrans">⚡ Dịch DOCX</button>
    <button class="btn-o" id="brescan" disabled title="Quét và dịch các đoạn còn sót">🔍 Quét bỏ sót</button>
    <button class="btn-g" id="bdl" disabled>⬇ Tải translated.docx</button>
    <button class="btn-o" id="bnew">📂 File mới</button>
  </div>
</header>

<div id="upload-zone">
  <div class="drop" id="drop">
    <div class="icon">📄</div>
    <h2>Kéo thả file Word vào đây</h2>
    <p>hoặc click để chọn file<br/>
    <span style="color:var(--accent);font-weight:600">Chỉ hỗ trợ .docx</span></p>
  </div>
  <input type="file" id="file-in" accept=".docx"/>
</div>

<div id="workspace">
  <div class="info-bar" id="info-bar">
    <span>📄</span>
    <span class="fname" id="fname">—</span>
    <span class="chip trans" id="chip-trans">— đoạn cần dịch</span>
    <span class="chip" id="chip-toc" style="border-color:#64d2ff;color:#64d2ff;display:none">— mục lục (sẽ dịch)</span>
    <span class="chip skip" id="chip-skip">— header/footer (giữ nguyên)</span>
  </div>

  <!-- Progress bar (shown during translation) -->
  <div id="prog-wrap">
    <div class="prog-top">
      <span class="prog-label" id="prog-label">Đang dịch...</span>
      <span class="prog-pct" id="prog-pct">0%</span>
    </div>
    <div class="prog-bar-bg">
      <div class="prog-bar-fill" id="prog-fill"></div>
    </div>
  </div>

  <div class="tbl-wrap">
    <table id="main-table">
      <thead>
        <tr>
          <th class="id-col">ID</th>
          <th class="role-col">Vai trò</th>
          <th class="en-col">🇬🇧 Tiếng Anh (gốc)</th>
          <th class="vi-col">🌐 Bản dịch <span style="font-size:.65rem;font-weight:400;color:var(--dim)">(click để sửa)</span></th>
        </tr>
      </thead>
      <tbody id="tbl-body">
        <tr><td colspan="4" style="text-align:center;color:var(--dim);padding:40px">
          Upload file .docx để bắt đầu
        </td></tr>
      </tbody>
    </table>
  </div>

  <div id="status"><div class="dot" id="sd"></div><span id="st">Sẵn sàng</span></div>
</div>

<div id="toast"></div>

<script>
"use strict";
const $ = id => document.getElementById(id);

let S = { sid: null, rows: [], evtSource: null };

// ── Upload ─────────────────────────────────────────────────────────────────
const drop = $("drop"), fin = $("file-in");
drop.onclick = () => fin.click();
drop.ondragover = e => { e.preventDefault(); drop.classList.add("over"); };
drop.ondragleave = () => drop.classList.remove("over");
drop.ondrop = e => {
  e.preventDefault(); drop.classList.remove("over");
  const f = e.dataTransfer.files[0];
  if (f && f.name.toLowerCase().endsWith(".docx")) uploadFile(f);
  else toast("⚠️ Chỉ hỗ trợ file .docx", "w");
};
fin.onchange = () => { if (fin.files[0]) uploadFile(fin.files[0]); };

async function uploadFile(file) {
  S.sid  = null;
  S.rows = [];
  $("bdl").disabled = true;
  $("btrans").disabled = false;
  setSt("Đang tải lên và phân tích...", true);

  const fd = new FormData(); fd.append("file", file);
  const d = await fetch("/upload", {method:"POST", body:fd})
    .then(r => r.json()).catch(e => ({error:String(e)}));

  if (d.error) { setSt(d.error, false, "e"); toast("❌ "+d.error, "e"); return; }

  S.sid = d.sid;
  $("upload-zone").style.display = "none";
  $("workspace").style.display = "flex";
  $("workspace").style.flexDirection = "column";
  $("hctls").style.display = "flex";
  $("fname").textContent = d.filename;
  $("chip-trans").textContent = `${d.translatable} đoạn cần dịch`;
  $("chip-skip").textContent  = `${d.header_footer} header/footer (giữ nguyên)`;
  if (d.toc_count > 0) {
    $("chip-toc").textContent = `${d.toc_count} mục lục (sẽ dịch)`;
    $("chip-toc").style.display = "";
  } else {
    $("chip-toc").style.display = "none";
  }

  renderRows(
    (d.preview || []).map(b => ({id:b.id, role:b.role, english:b.text, vietnamese:""})),
    false
  );
  setSt(`Đã tải: ${d.filename} — ${d.translatable} đoạn cần dịch`, false);
}

// ── Translate via SSE ───────────────────────────────────────────────────────
$("btrans").onclick = () => {
  if (!S.sid) return;
  if (S.evtSource) { S.evtSource.close(); S.evtSource = null; }

  $("btrans").disabled = true;
  $("bdl").disabled    = true;
  $("prog-wrap").style.display = "block";
  setProgress(0, "Đang phân loại đoạn văn...");
  setSt("Gemini đang dịch...", true);

  // Clear table, show empty state
  S.rows = [];
  $("tbl-body").innerHTML = '<tr class="loading"><td colspan="4" style="text-align:center;color:var(--dim);padding:30px">Đang chuẩn bị...</td></tr>';

  const lang = $("lsel").value;
  const es   = new EventSource(`/translate_stream?sid=${S.sid}&lang=${encodeURIComponent(lang)}`);
  S.evtSource = es;

  es.onmessage = e => {
    let data;
    try { data = JSON.parse(e.data); } catch { return; }

    if (data.type === "status") {
      setSt(data.message, true);
      setProgress(0, data.message);

    } else if (data.type === "progress") {
      const pct   = data.pct;
      const label = `Đoạn ${data.done}/${data.total} — Chunk ${data.chunk}/${data.total_chunks}`;
      setProgress(pct, label);
      setSt(`${label} (${pct}%)`, true);

      // Append new rows to table
      appendRows(data.rows);

    } else if (data.type === "done") {
      es.close(); S.evtSource = null;
      $("btrans").disabled  = false;
      $("bdl").disabled     = false;
      $("brescan").disabled = false;
      setProgress(100, `Dịch xong ${data.translated_count} đoạn ✓`);
      setSt(`✅ Dịch xong ${data.translated_count} đoạn — nhấn ⬇ để tải file`, false);
      toast("✅ Dịch xong! Tải file để review trong Word.");
      // Hide progress bar after a moment
      setTimeout(() => { $("prog-wrap").style.display = "none"; }, 2500);

    } else if (data.type === "error") {
      es.close(); S.evtSource = null;
      $("btrans").disabled  = false;
      $("brescan").disabled = false;
      $("prog-wrap").style.display = "none";
      setSt("Lỗi: " + data.message, false, "e");
      toast("❌ " + data.message, "e");
    }
  };

  es.onerror = () => {
    es.close(); S.evtSource = null;
    $("btrans").disabled  = false;
    $("brescan").disabled = false;
    $("prog-wrap").style.display = "none";
    setSt("Mất kết nối với server", false, "e");
    toast("❌ Mất kết nối", "e");
  };
};

// ── Render / Append rows ────────────────────────────────────────────────────
const ROLE_LABELS = {
  title:           "Title",
  section_heading: "Heading",
  paragraph:       "Paragraph",
  bullet:          "Bullet",
  table_cell:      "Table cell",
  note:            "Note",
  toc:             "TOC",
  header:          "Header ⛔",
  footer:          "Footer ⛔",
};

function renderRows(rows, showTrans) {
  const body = $("tbl-body");
  if (!rows || !rows.length) {
    body.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--dim);padding:30px">Không có dữ liệu</td></tr>';
    return;
  }
  body.innerHTML = rows.map(r => rowHTML(r, showTrans)).join("");
  if (showTrans) attachEditListeners();
}

function appendRows(rows) {
  if (!rows || !rows.length) return;
  const body = $("tbl-body");
  // Remove placeholder if present
  const placeholder = body.querySelector("tr.loading");
  if (placeholder) placeholder.remove();

  const frag = document.createDocumentFragment();
  rows.forEach(r => {
    const tr = document.createElement("tr");
    tr.dataset.bid = r.id;
    tr.innerHTML = rowHTML(r, true);
    frag.appendChild(tr);
    // Attach edit listener for the vi cell
    const viCell = tr.querySelector("td.vi-col");
    if (viCell) attachCellEdit(viCell, r.id);
  });
  body.appendChild(frag);

  // Auto-scroll disabled — user stays at top to monitor progress
}

function rowHTML(r, showTrans) {
  return `
    <tr data-bid="${esc(r.id)}">
      <td class="id-col">${esc(r.id)}</td>
      <td class="role-col"><span class="role role-${r.role||'paragraph'}">${ROLE_LABELS[r.role]||r.role}</span></td>
      <td class="en-col">${esc(r.english||r.text||"")}</td>
      <td class="vi-col" data-bid="${esc(r.id)}" ${showTrans?'contenteditable="true"':''}>
        ${showTrans && r.vietnamese
          ? esc(r.vietnamese)
          : '<span style="color:var(--dim);font-style:italic">—</span>'}
      </td>
    </tr>`;
}

function attachEditListeners() {
  document.querySelectorAll("td.vi-col[contenteditable]").forEach(cell => {
    attachCellEdit(cell, cell.dataset.bid);
  });
}

// Debounce save per cell
const _saveTimers = {};

function attachCellEdit(cell, bid) {
  cell.addEventListener("input", () => {
    clearTimeout(_saveTimers[bid]);
    _saveTimers[bid] = setTimeout(() => saveEdit(bid, cell), 900);
  });
  cell.addEventListener("blur", () => {
    clearTimeout(_saveTimers[bid]);
    saveEdit(bid, cell);
  });
  // Prevent newline on Enter — keep single-line feel like Word
  cell.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      cell.blur();
    }
  });
}

async function saveEdit(bid, cell) {
  if (!S.sid) return;
  const text = cell.innerText.trim();
  cell.classList.add("saving");
  try {
    const res = await fetch("/save_edit", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({sid: S.sid, id: bid, text}),
    }).then(r => r.json());
    cell.classList.remove("saving");
    if (res.ok) {
      // Flash saved indicator
      cell.classList.add("saved-ok");
      setTimeout(() => cell.classList.remove("saved-ok"), 1600);
      $("bdl").disabled = false;
    }
  } catch (err) {
    cell.classList.remove("saving");
  }
}

// ── Download ────────────────────────────────────────────────────────────────
$("bdl").onclick = () => { if (S.sid) window.open("/download/"+S.sid,"_blank"); };

// ── Rescan: dịch các đoạn còn sót (bản dịch = text gốc hoặc rỗng) ──────────
$("brescan").onclick = () => {
  if (!S.sid) return;
  if (S.evtSource) { S.evtSource.close(); S.evtSource = null; }

  // Thu thập id các ô vi-col mà nội dung == text gốc hoặc rỗng
  const skipIds = new Set();
  document.querySelectorAll("tr[data-bid]").forEach(tr => {
    const bid    = tr.dataset.bid;
    const enCell = tr.querySelector("td.en-col");
    const viCell = tr.querySelector("td.vi-col");
    if (!enCell || !viCell) return;
    const enText = enCell.innerText.replace("↵ ", "\n").trim();
    const viText = viCell.innerText.trim();
    // Đã dịch nếu viText khác enText và không rỗng
    if (viText && viText !== enText && viText !== "—") {
      skipIds.add(bid);
    }
  });

  $("brescan").disabled = true;
  $("btrans").disabled  = true;
  $("bdl").disabled     = true;
  $("prog-wrap").style.display = "block";
  setProgress(0, "Đang quét đoạn bỏ sót...");
  setSt("Quét và dịch đoạn bỏ sót...", true);

  const lang = $("lsel").value;
  const url  = `/translate_stream?sid=${S.sid}&lang=${encodeURIComponent(lang)}&skip_ids=${encodeURIComponent(JSON.stringify([...skipIds]))}`;
  const es   = new EventSource(url);
  S.evtSource = es;

  es.onmessage = e => {
    let data;
    try { data = JSON.parse(e.data); } catch { return; }

    if (data.type === "status") {
      setSt(data.message, true);
      setProgress(0, data.message);

    } else if (data.type === "progress") {
      const pct   = data.pct;
      const label = `Quét: ${data.done}/${data.total} — Chunk ${data.chunk}/${data.total_chunks}`;
      setProgress(pct, label);
      setSt(`${label} (${pct}%)`, true);
      // Cập nhật ô đã có thay vì append mới
      updateRows(data.rows);

    } else if (data.type === "done") {
      es.close(); S.evtSource = null;
      $("btrans").disabled  = false;
      $("brescan").disabled = false;
      $("bdl").disabled     = false;
      setProgress(100, `Quét xong — đã dịch thêm ${data.translated_count} đoạn ✓`);
      setSt(`✅ Quét xong — thêm ${data.translated_count} đoạn`, false);
      toast("✅ Quét xong! Kiểm tra bảng và tải file.");
      setTimeout(() => { $("prog-wrap").style.display = "none"; }, 2500);

    } else if (data.type === "error") {
      es.close(); S.evtSource = null;
      $("btrans").disabled  = false;
      $("brescan").disabled = false;
      $("prog-wrap").style.display = "none";
      setSt("Lỗi: " + data.message, false, "e");
      toast("❌ " + data.message, "e");
    }
  };

  es.onerror = () => {
    es.close(); S.evtSource = null;
    $("btrans").disabled  = false;
    $("brescan").disabled = false;
    $("prog-wrap").style.display = "none";
    setSt("Mất kết nối", false, "e");
    toast("❌ Mất kết nối", "e");
  };
};

// Cập nhật ô bản dịch đã có trong bảng (dùng cho rescan)
function updateRows(rows) {
  if (!rows || !rows.length) return;
  rows.forEach(r => {
    const tr = document.querySelector(`tr[data-bid="${r.id}"]`);
    if (!tr) return;
    const viCell = tr.querySelector("td.vi-col");
    if (!viCell) return;
    const newText = r.vietnamese || r.english || "";
    if (newText && viCell.innerText.trim() !== newText) {
      viCell.innerText = newText;
      viCell.classList.add("saved-ok");
      setTimeout(() => viCell.classList.remove("saved-ok"), 1600);
    }
  });
}

// ── Progress bar ────────────────────────────────────────────────────────────
function setProgress(pct, label) {
  $("prog-fill").style.width = pct + "%";
  $("prog-pct").textContent  = pct + "%";
  $("prog-label").textContent = label || "";
}

// ── Reset ───────────────────────────────────────────────────────────────────
$("bnew").onclick = () => {
  if (S.evtSource) { S.evtSource.close(); S.evtSource = null; }
  S = {sid:null, rows:[], evtSource:null};
  $("upload-zone").style.display = "flex";
  $("workspace").style.display   = "none";
  $("hctls").style.display       = "none";
  $("bdl").disabled  = true;
  $("prog-wrap").style.display = "none";
  fin.value = "";
};

// ── Helpers ─────────────────────────────────────────────────────────────────
function setSt(msg, loading, type) {
  $("st").textContent = msg;
  const dot  = $("sd");
  const spin = document.querySelector(".spin");
  if (loading) {
    dot.style.display = "none";
    if (!spin) {
      const s = document.createElement("div");
      s.className = "spin";
      $("status").prepend(s);
    }
  } else {
    dot.style.display = "block";
    if (spin) spin.remove();
    dot.className = "dot"+(type==="e"?" e":type==="w"?" w":"");
  }
}

let tt;
function toast(msg, type) {
  const t = $("toast");
  t.textContent = msg;
  t.className = "on"+(type==="e"?" e":type==="w"?" w":"");
  clearTimeout(tt); tt = setTimeout(()=>t.className="", 3200);
}

function esc(s) {
  return String(s||"")
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/\n/g,"↵ ");
}
